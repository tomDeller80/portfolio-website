    <footer class="py-5 mt-5">
        <div class="container text-center text-secondary small">
            <div class="mb-5">

                {% if admin.github %}
                <a href="{{admin.github}}" class="text-secondary me-3"><i class="fab fa-github fa-4x"></i></a>
                {% endif %}

                {% if admin.linkedin %}
                <a href="https://www.linkedin.com/in/thomas-deller/" class="text-secondary me-3"><i class="fab fa-linkedin fa-4x"></i></a>
                {% endif %}

                <a href="{{ url_for('contact') }}" class="text-secondary"><i class="fas fa-envelope fa-4x"></i></a>

            </div>
            <p>&copy; {{ date.strftime('%Y') }} {{admin.name}} | Built with <span class="text-danger">♥</span> and Flask</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
